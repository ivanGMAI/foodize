exclude: '(^|.*/)(package(-lock)?\.json|__pycache__|\.mypy_cache|\.venv|\.vite)/'

repos:
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.14.4
    hooks:
      - id: ruff
        args:
          - --fix
          - --exit-non-zero-on-fix
          - --unsafe-fixes
        files: ^src/(backend|telegram-bot)/

  - repo: https://github.com/psf/black
    rev: 25.9.0
    hooks:
      - id: black
        args:
          - "--config"
          - "src/backend/pyproject.toml"
        files: ^src/(backend|telegram-bot)/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        args:
          - --check-untyped-defs
          - --ignore-missing-imports
          - --install-types
          - --non-interactive
          - --scripts-are-modules
          - --warn-unused-ignores
        stages:
          - manual
        files: ^src/backend/

  - repo: local
    hooks:
      - id: eslint-frontend
        name: eslint (frontend)
        entry: eslint
        args:
          - "--config"
          - "src/frontend/eslint.config.js"
        language: node
        language_version: "22.17.0"
        files: ^src/frontend/.*\.(js|jsx)$
        additional_dependencies:
          - "eslint@9.39.1"
          - "@eslint/js@9.39.4"
          - "eslint-plugin-react@7.37.5"
          - "eslint-plugin-react-hooks@5.2.0"
          - "eslint-plugin-react-refresh@0.4.24"
          - "globals@16.5.0"
          - "eslint-config-prettier@10.1.8"
      - id: eslint-miniapp
        name: eslint (telegram-miniapp)
        entry: eslint
        args:
          - "--config"
          - "src/telegram-miniapp/eslint.config.js"
        language: node
        language_version: "22.17.0"
        files: ^src/telegram-miniapp/.*\.(js|jsx)$
        additional_dependencies:
          - "eslint@9.39.1"
          - "@eslint/js@9.39.4"
          - "eslint-plugin-react@7.37.5"
          - "eslint-plugin-react-hooks@5.2.0"
          - "globals@16.5.0"
          - "eslint-config-prettier@10.1.8"
      - id: prettier-frontend
        name: prettier (frontend)
        entry: npm
        args:
          - "--prefix"
          - "src/frontend"
          - "exec"
          - "prettier"
          - "--"
          - "--write"
        language: system
        files: "^src/frontend/.*\\.(js|jsx|css|html)$"
        exclude: "^src/frontend/coverage/"
      - id: prettier-miniapp
        name: prettier (telegram-miniapp)
        entry: npm
        args:
          - "--prefix"
          - "src/telegram-miniapp"
          - "exec"
          - "prettier"
          - "--"
          - "--write"
        language: system
        files: "^src/telegram-miniapp/.*\\.(js|jsx|css|html)$"
        exclude: "^src/telegram-miniapp/coverage/"

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
